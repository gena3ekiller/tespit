<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tespit Legal & Support</title>
  <style>
:root{color-scheme:light dark;--bg:#f5f7fb;--card:rgba(255,255,255,.88);--text:#111827;--muted:#5b6472;--border:rgba(17,24,39,.10);--accent:#0a84ff}
@media(prefers-color-scheme:dark){:root{--bg:#090b10;--card:rgba(22,24,31,.88);--text:#f5f7fb;--muted:#a8b0bf;--border:rgba(255,255,255,.12);--accent:#64aaff}}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;background:radial-gradient(circle at top,rgba(10,132,255,.18),transparent 32rem),var(--bg);color:var(--text);line-height:1.62}
main{max-width:960px;margin:0 auto;padding:48px 20px 72px}.card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:32px;box-shadow:0 18px 60px rgba(0,0,0,.10);backdrop-filter:blur(18px)}
h1{font-size:clamp(2rem,5vw,3.2rem);line-height:1.1;margin:0 0 12px}h2{margin-top:34px;font-size:1.35rem}h3{margin-top:24px;font-size:1.05rem}
p,li{color:var(--muted)}a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}.badge{display:inline-flex;padding:6px 12px;border-radius:999px;background:rgba(10,132,255,.12);color:var(--accent);font-weight:700;margin-bottom:18px}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin:24px 0 0}.nav a{border:1px solid var(--border);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.08)}
.footer{margin-top:32px;font-size:.92rem;color:var(--muted)}.notice{padding:16px 18px;border-radius:18px;background:rgba(10,132,255,.10);border:1px solid rgba(10,132,255,.18)}
ul{padding-left:1.3rem}.ok{padding:16px 18px;border-radius:18px;background:rgba(52,199,89,.10);border:1px solid rgba(52,199,89,.18)}
</style>
</head>
<body>
  <main>
    <section class="card">
      <div class="badge">Tespit</div>
      <h1>Legal & Support</h1>
      <p class="notice">Bitte wähle eine Sprache / Please choose a language / Lütfen bir dil seçin.</p>
      <div class="nav">
        <a href="./de/support.html">Deutsch: Support</a>
        <a href="./de/privacy.html">Deutsch: Datenschutz</a>
        <a href="./en/support.html">English: Support</a>
        <a href="./en/privacy.html">English: Privacy</a>
        <a href="./tr/support.html">Türkçe: Destek</a>
        <a href="./tr/privacy.html">Türkçe: Gizlilik</a>
      </div>
      <p class="footer">© 2026 Esat Arslan.</p>
    </section>
  </main>
</body>
</html>
